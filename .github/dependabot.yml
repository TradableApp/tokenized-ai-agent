version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    groups:
      github-actions:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: bun
    directories:
      - /
      - /oracle
      - /oracle/src/elizaos/plugins/plugin-senseai
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    groups:
      all-non-major:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
