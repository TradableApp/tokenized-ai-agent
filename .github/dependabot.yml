version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: bun
    directories:
      - /
      - /oracle
      # Bundled ElizaOS plugin required at runtime by oracle/src/aiAgentOracle.js
      # (own package.json + bun.lock; ships axios/zod/@elizaos deps).
      - /oracle/src/elizaos/plugins/plugin-senseai
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    groups:
      all-non-major:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
