version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'bun'
    directory: '/oracle'
    schedule:
      interval: 'weekly'

  # Bundled ElizaOS plugin required at runtime by oracle/src/aiAgentOracle.js
  # (own package.json + bun.lock; ships axios/zod/@elizaos deps).
  - package-ecosystem: 'bun'
    directory: '/oracle/src/elizaos/plugins/plugin-senseai'
    schedule:
      interval: 'weekly'
